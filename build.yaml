---
include:
  - board: nice_nano//zmk
    shield: urchin_left nice_view_adapter nice_view_gem
    # snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_NICE_VIEW_GEM_ANIMATION_MS=96000 -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: urchin_left

  - board: nice_nano//zmk
    shield: urchin_right nice_view_adapter nice_view_gem
    cmake-args: -DCONFIG_NICE_VIEW_GEM_ANIMATION_MS=96000
    artifact-name: urchin_right

  - board: xiao_ble//zmk
    shield: urchin_dongle dongle_screen
    cmake-args: -DCONFIG_DONGLE_SCREEN_DEFAULT_BRIGHTNESS=50 -DCONFIG_DONGLE_SCREEN_BRIGHTNESS_STEP=2 -DCONFIG_DONGLE_SCREEN_WPM_ACTIVE=n
    artifact-name: urchin_dongle

  - board: nice_nano//zmk
    shield: settings_reset
    artifact-name: settings_reset_nin

